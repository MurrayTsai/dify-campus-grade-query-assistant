    - data:
        code: "import re\nimport json\n\ndef main(args: str) -> dict:\n    # 默认返回值\n\
          \    default_output = {\n        \"results\": \"\",\n        \"ECHarts\"\
          : \"0\",\n        \"chartType\": \"\",\n        \"chartTitle\": \"\",\n\
          \        \"chartData\": \"\",\n        \"chartXAxis\": \"\"\n    }\n   \
          \ \n    try:\n        match = re.search(r'```json\\s*([\\s\\S]*?)\\s*```',\
          \ args)\n        if not match:\n            raise ValueError(\"输入字符串中未找到有效的\
          \ JSON 数据\")\n        \n        json_str = match.group(1).strip()\n    \
          \    results_dict = json.loads(json_str)\n    except Exception as e:\n \
          \       print(f\"解析失败: {e}\")\n        return default_output\n    \n   \
          \ if \"ECHarts\" not in results_dict:\n        results_dict[\"ECHarts\"\
          ] = \"0\"\n    \n    if results_dict[\"ECHarts\"] == \"1\":\n        required_chart_fields\
          \ = [\"chartType\", \"chartTitle\", \"chartData\", \"chartXAxis\"]\n   \
          \     for field in required_chart_fields:\n            if field not in results_dict:\n\
          \                results_dict[field] = \"\"\n    \n    # 标准分隔符：把逗号统一转成 ECharts\
          \ 要求的分号\n    if results_dict.get(\"chartData\"):\n        results_dict[\"\
          chartData\"] = results_dict[\"chartData\"].replace(\"，\", \";\").replace(\"\
          ,\", \";\")\n    if results_dict.get(\"chartXAxis\"):\n        results_dict[\"\
          chartXAxis\"] = results_dict[\"chartXAxis\"].replace(\"，\", \";\").replace(\"\
          ,\", \";\")\n    \n    return {\n        \"results\": str(results_dict.get(\"\
          results\", \"\")),\n        \"ECHarts\": str(results_dict.get(\"ECHarts\"\
          , \"0\")),\n        \"chartType\": str(results_dict.get(\"chartType\", \"\
          \")),\n        \"chartTitle\": str(results_dict.get(\"chartTitle\", \"\"\
          )),\n        \"chartData\": str(results_dict.get(\"chartData\", \"\")),\n\
          \        \"chartXAxis\": str(results_dict.get(\"chartXAxis\", \"\"))\n \
          \   }"
