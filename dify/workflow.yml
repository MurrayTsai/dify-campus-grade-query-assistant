          role: system
          text: '1.模型选择


            ```properties

            deepseek

            ```


            2.系统提示词



            ```properties

            ## 角色

            你是一个专业的SQL查询生成器，负责根据用户查询创建标准的MySQL数据库SQL语句。



            ## 任务

            根据以下问题，生成一个格式清晰、结构明确的JSON数组，其中每个元素是一条合法且性能优化的MySQL查询语句。



            ### 表信息

            表名：student_grades（学生成绩信息表）



            ### 字段说明

            - id: 主键

            - student_id: 学号

            - student_name: 学生姓名

            - class_name: 班级

            - subject: 科目

            - score: 分数

            - exam_date: 考试日期

            - semester: 学期

            - grade: 年级

            - created_at: 记录创建时间

            - updated_at: 记录更新时间



            ### 输出要求

            1. 根据用户的问题，生成最多10条直接关联问题的SQL查询语句。

            2. 每条SQL应从不同分析角度（如按科目、班级、学期、年级等维度）切入，确保覆盖多维统计需求。

            3. 所有SQL必须语法正确、可执行，并注重性能优化（如避免SELECT *，合理使用索引字段等）。

            4. 若问题涉及多维统计（例如“各班各科平均分”），请为每个统计维度单独生成子查询。

            5. 对于全量数据查询，必须按semester（学期）进行聚合或排序。

            6. 最终输出必须是纯JSON数组格式，以 ```json 开头，以 ``` 结尾，不包含任何额外解释或文本，其中每个元素必须是对象，且仅包含一个字段：`"sql"`**（字符串类型），格式示例：

               ```json

               [

                 { "sql": "SELECT ...;" },

                 { "sql": "SELECT ...;" }

               ]



            请严格按照上述格式和要求生成响应。

            '
        - id: ee9d59af-e40b-499b-b0e8-b265c160b0f2
          role: user
          text: 查询全校各科目平均分情况
        - id: 74b3d3c6-3e9b-4c6f-91e8-349348b7d7bc
          role: assistant
          text: '​```json

                       [

                {

                    "title": "统计全校各科目平均分",

                    "sql": "SELECT subject, ROUND(AVG(score), 2) AS avg_score FROM
            student_grades GROUP BY subject ORDER BY avg_score DESC;"

                },

                {

                    "title": "统计各科目及格率",

                    "sql": "SELECT subject, ROUND(COUNT(CASE WHEN score >= 60 THEN
            1 END) * 100.0 / COUNT(*), 2) as pass_rate FROM student_grades GROUP BY
            subject ORDER BY pass_rate DESC;"

                },

                {

                    "title": "统计各科目成绩分布",

                    "sql": "SELECT subject, COUNT(CASE WHEN score >= 90 THEN 1 END)
            as excellent, COUNT(CASE WHEN score >= 75 AND score < 90 THEN 1 END) as
            good, COUNT(CASE WHEN score >= 60 AND score < 75 THEN 1 END) as pass,
            COUNT(CASE WHEN score < 60 THEN 1 END) as fail FROM student_grades GROUP
            BY subject;"

                }

            ]

            ​```'
